<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <div class="p-3" layout:fragment="content">
        <form method="POST" th:action="@{/admin/saveProduct}">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input id="name" type="text" name="name" class="form-control" th:value="${product.name}"/>
                <span class="text-danger" th:errors="${product.name}"></span>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input id="price" type="text" name="price" class="form-control" th:value="${product.price}"/>
                <span class="text-danger" th:errors="${product.price}"></span>
            </div>
            <div class="mb-3">
                <label for="quantity" class="form-label">Quantity</label>
                <input id="quantity" type="text" name="quantity" class="form-control" th:value="${product.quantity}"/>
                <span class="text-danger" th:errors="${product.quantity}"></span>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</body>
</html>
